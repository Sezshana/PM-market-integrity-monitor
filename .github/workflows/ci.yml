name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests and syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests
      - name: Compile Python modules
        run: |
          python -m py_compile \
            monitor.py \
            wash_trading_module.py \
            aggregator.py \
            email_template.py \
            onchain_monitor.py \
            src/polymarket_monitor/*.py \
            src/polymarket_monitor/clients/*.py \
            src/polymarket_monitor/detectors/*.py \
            src/polymarket_monitor/reporting/*.py \
            src/polymarket_monitor/storage/*.py

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Run pip-audit
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements.txt

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
