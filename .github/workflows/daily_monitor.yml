name: Polymarket OSINT Daily Monitor

on:
  schedule:
    # GitHub often delays the 7 AM slot until evening; 10:30 AM is a same-day backup.
    - cron: '0 7 * * *'
      timezone: America/New_York
    - cron: '30 10 * * *'
      timezone: America/New_York
  workflow_dispatch:
    inputs:
      force_email:
        description: Send email even if today's digest was already sent
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: Run monitor
        env:
          TZ: America/New_York
          PYTHONPATH: src
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FORCE_EMAIL: ${{ github.event_name == 'workflow_dispatch' && (inputs.force_email == true) }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          POLYGONSCAN_KEY: ${{ secrets.POLYGONSCAN_KEY }}
        run: python monitor.py
      - name: Run aggregator
        env:
          POLYGONSCAN_KEY: ${{ secrets.POLYGONSCAN_KEY }}
        run: python aggregator.py
      - name: Run diagnostics
        if: always()
        env:
          ALERT_EMAIL_CONFIGURED: ${{ secrets.ALERT_EMAIL != '' }}
          SMTP_PASSWORD_CONFIGURED: ${{ secrets.SMTP_PASSWORD != '' }}
        run: |
          today="$(date -u +%F)"
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "alert_email_configured=${ALERT_EMAIL_CONFIGURED}"
          echo "smtp_password_configured=${SMTP_PASSWORD_CONFIGURED}"
          echo "report_json_exists=$([ -f "output/report_${today}.json" ] && echo true || echo false)"
          echo "report_markdown_exists=$([ -f "output/report_${today}.md" ] && echo true || echo false)"
          echo "aggregate_intelligence_exists=$([ -f "data/aggregate_intelligence.json" ] && echo true || echo false)"
          git status --short output data || true
      - name: Save all outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout -B main
          git add output/ data/
          git reset -- data/digest_email_sent.json 2>/dev/null || true
          # email_dispatch_state.json is committed so all runners share once-per-day dedup
          if git diff --staged --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "Daily OSINT report + intelligence update"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "Pushed report updates on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; retrying in 8s..."
            sleep 8
          done
          echo "Failed to push after 5 attempts."
          exit 1
