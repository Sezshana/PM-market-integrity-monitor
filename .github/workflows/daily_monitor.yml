name: Polymarket OSINT Daily Monitor

on:
  schedule:
    # 7:17 AM Eastern — off the hour to reduce GitHub queue backlog.
    # GitHub may still delay runs by hours; monitor.py sends at most one email/day.
    - cron: '17 7 * * *'
      timezone: America/New_York
  workflow_dispatch:
    inputs:
      force_email:
        description: Send email even if today's digest was already sent
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: Run monitor
        env:
          PYTHONPATH: src
          FORCE_EMAIL: ${{ github.event_name == 'workflow_dispatch' && (inputs.force_email != false) }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          POLYGONSCAN_KEY: ${{ secrets.POLYGONSCAN_KEY }}
        run: python monitor.py
      - name: Run aggregator
        env:
          POLYGONSCAN_KEY: ${{ secrets.POLYGONSCAN_KEY }}
        run: python aggregator.py
      - name: Run diagnostics
        if: always()
        env:
          ALERT_EMAIL_CONFIGURED: ${{ secrets.ALERT_EMAIL != '' }}
          SMTP_PASSWORD_CONFIGURED: ${{ secrets.SMTP_PASSWORD != '' }}
        run: |
          today="$(date -u +%F)"
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "alert_email_configured=${ALERT_EMAIL_CONFIGURED}"
          echo "smtp_password_configured=${SMTP_PASSWORD_CONFIGURED}"
          echo "report_json_exists=$([ -f "output/report_${today}.json" ] && echo true || echo false)"
          echo "report_markdown_exists=$([ -f "output/report_${today}.md" ] && echo true || echo false)"
          echo "aggregate_intelligence_exists=$([ -f "data/aggregate_intelligence.json" ] && echo true || echo false)"
          git status --short output data || true
      - name: Save all outputs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/ data/
          git reset -- data/digest_email_sent.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily OSINT report + intelligence update"
          git push
