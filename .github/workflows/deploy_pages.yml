name: Deploy Dashboard to GitHub Pages

on:
  # GitHub Pages is optional for this repo. Keep deployment manual so pushes
  # do not fail in repositories where Pages has not been enabled yet.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build dashboard artifact
        run: |
          rm -rf site
          mkdir -p site/data
          cp dashboard.html site/
          if [ -d output ]; then
            cp -R output site/output
          fi
          if [ -f data/aggregate_intelligence.json ]; then
            cp data/aggregate_intelligence.json site/data/
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
